<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1e1b4b"/>
      <stop offset="100%" style="stop-color:#312e81"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#818cf8"/>
      <stop offset="100%" style="stop-color:#6366f1"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="512" height="512" rx="112" fill="url(#bg)"/>
  <!-- Chart bars -->
  <rect x="96" y="300" width="64" height="116" rx="12" fill="url(#accent)" opacity="0.7"/>
  <rect x="184" y="220" width="64" height="196" rx="12" fill="url(#accent)" opacity="0.85"/>
  <rect x="272" y="160" width="64" height="256" rx="12" fill="url(#accent)"/>
  <rect x="360" y="240" width="64" height="176" rx="12" fill="url(#accent)" opacity="0.9"/>
  <!-- Trend line -->
  <polyline points="128,280 216,200 304,140 392,220" fill="none" stroke="#c7d2fe" stroke-width="10" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Dots on line -->
  <circle cx="128" cy="280" r="10" fill="#e0e7ff"/>
  <circle cx="216" cy="200" r="10" fill="#e0e7ff"/>
  <circle cx="304" cy="140" r="10" fill="#e0e7ff"/>
  <circle cx="392" cy="220" r="10" fill="#e0e7ff"/>
  <!-- Top label -->
  <text x="256" y="90" text-anchor="middle" font-family="system-ui,sans-serif" font-weight="700" font-size="48" fill="#e0e7ff" letter-spacing="2">LIFE</text>
</svg>
