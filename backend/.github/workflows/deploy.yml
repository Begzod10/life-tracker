  name: Deploy to Server                                                                                           
                  
  "on":
    push:
      branches:
        - master

  jobs:
    deploy:
      runs-on: ubuntu-latest
      steps:
        - name: SSH and deploy
          uses: appleboy/ssh-action@v1.0.0
          with:
            host: ${{ secrets.SERVER_HOST }}
            username: root
            key: ${{ secrets.SERVER_SSH_KEY }}
            script: /var/www/life_tracker/deploy.sh
