name: Backend tests

# Run the critical-path test suite on every push and PR. The deploy
# workflow runs in parallel and doesn't currently gate on this job —
# wire `needs: [tests]` into deploy.yml when you want green tests to
# be a hard prerequisite for shipping.

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  tests:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      # Install postgres directly via apt — avoids Docker Hub pull entirely.
      - uses: ankane/setup-postgres@v1
        with:
          postgres-version: 16
          database: life_tracker_test

      - name: Create test user
        run: psql life_tracker_test -c "ALTER USER runner WITH PASSWORD '123';"

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-cov

      - name: Run critical-path tests
        env:
          # Same connection string conftest.py uses for the test DB.
          DATABASE_URL: postgresql://runner:123@localhost:5432/life_tracker_test
          SECRET_KEY: ci-only-secret-key-not-used-for-anything-real
          # Settings flags these as required at import-time even though the
          # OAuth flow is not exercised by these tests. Feed dummy values so
          # Pydantic stops short-circuiting the suite.
          GOOGLE_CLIENT_ID: ci-dummy-client-id
          GOOGLE_CLIENT_SECRET: ci-dummy-client-secret
        run: |
          pytest tests/test_timetable_toggle.py \
                 tests/test_books_highlights.py \
                 tests/test_definition_lookup.py \
                 -v --tb=short
